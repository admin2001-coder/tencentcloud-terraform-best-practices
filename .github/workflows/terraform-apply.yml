name: terraform-apply

on:
  workflow_dispatch:
    inputs:
      workdir:
        description: 'Terraform stack working dir (e.g. infra/env/dev/network)'
        required: true
        type: string

permissions:
  contents: read

jobs:
  apply:
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash
        working-directory: ${{ inputs.workdir }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Terraform init
        run: terraform init -input=false

      - name: (Optional) Download last plan from COS
        if: ${{ secrets.COS_BUCKET != '' }}
        env:
          COS_BUCKET: ${{ secrets.COS_BUCKET }}
          COS_REGION: ${{ secrets.COS_REGION }}
          COS_PREFIX: ${{ secrets.COS_PREFIX }}
          ENV_NAME: dev
          STACK_NAME: network
        run: |
          echo "NOTE: set ENV_NAME/STACK_NAME mapping if you want apply to use a remote plan artifact."

      - name: Terraform apply
        run: terraform apply -input=false -auto-approve
