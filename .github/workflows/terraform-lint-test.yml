name: terraform-lint-test

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: read

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Lint + Validate (mock-safe)
        run: |
          chmod +x scripts/ci_terraform_lint_test.sh
          scripts/ci_terraform_lint_test.sh
